name: Codacy Security Scan

on:
  push:
    branches: [ "main", "dev", "*" ]
  pull_request:
    branches: [ "main", "dev", "*" ]
  schedule:
    - cron: '21 1 * * 1'

permissions:
  contents: read

jobs:
  codacy-security-scan:
    permissions:
      contents: read
      security-events: write
      actions: read
    name: Codacy Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Codacy Analysis CLI
        uses: codacy/codacy-analysis-cli-action@d840f886c4bd4edc059706d09c6a1586111c540b
        with:
          project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
          verbose: true
          output: results.sarif
          format: sarif
          max-allowed-issues: 2147483647

      - name: Validate SARIF file for single run
        run: |
          # This step ensures only one run per SARIF file.
          # If you use Codacy CLI, it already generates one run per file; this is for safety with future CLI versions.
          jq '.runs |= if type=="array" then [.[0]] else . end' results.sarif > results.single-run.sarif

      - name: Upload SARIF results file
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.single-run.sarif
